<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение на бильярд 🎱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0b0c1a 0%, #1a1e30 100%);
      padding: 1rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2rem 1.8rem 2.5rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.3s ease;
      text-align: center;
      color: #f5f0eb;
      position: relative;
      overflow: hidden;
    }

    /* декоративные шары */
    .card::before {
      content: "🎱";
      position: absolute;
      font-size: 7rem;
      opacity: 0.04;
      bottom: -10px;
      right: -10px;
      transform: rotate(15deg);
      pointer-events: none;
    }

    .card::after {
      content: "✨";
      position: absolute;
      font-size: 4rem;
      opacity: 0.06;
      top: 10px;
      left: 10px;
      transform: rotate(-10deg);
      pointer-events: none;
    }

    .emoji-billiard {
      font-size: 4.2rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 12px rgba(255, 215, 0, 0.25));
      margin-bottom: 0.5rem;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(-2deg); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0.2rem 0 0.3rem;
      background: linear-gradient(135deg, #ffe68f, #ffd966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }

    .sub {
      font-size: 1rem;
      color: #c8c2d9;
      margin-bottom: 1.6rem;
      border-bottom: 1px dashed rgba(255, 215, 0, 0.2);
      padding-bottom: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .question-box {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 2rem;
      padding: 1.2rem 1rem;
      margin: 1.5rem 0 1.8rem;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.4);
    }

    .question {
      font-size: 1.4rem;
      font-weight: 500;
      color: #fff4e0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .question span {
      background: rgba(255, 215, 0, 0.15);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 1.7rem;
      line-height: 1.4;
    }

    .btn-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      margin: 2rem 0 1.2rem;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 0.8rem 2.4rem;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.5px;
      position: relative;
    }

    .btn-yes {
      background: linear-gradient(145deg, #4caf84, #2d8f6f);
      color: white;
      box-shadow: 0 4px 15px rgba(76, 175, 132, 0.4);
    }
    .btn-yes:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(76, 175, 132, 0.6);
    }

    .btn-no {
      background: linear-gradient(145deg, #5a4a6b, #3d2e4d);
      color: #d4c9e0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      transition: all 0.15s ease;
      position: relative;
    }

    .btn-no:active {
      transform: scale(0.94);
    }

    .btn-no--disabled {
      opacity: 0.5;
      filter: grayscale(0.6);
      pointer-events: none;
      transform: scale(0.96);
    }

    .btn-no__message {
      display: none;
      font-size: 0.7rem;
      background: #ffb3b3;
      color: #5a1e1e;
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      font-weight: 600;
      margin-left: 6px;
      white-space: nowrap;
    }

    .btn-no--disabled .btn-no__message {
      display: inline-block;
      animation: popMsg 0.3s ease;
    }

    @keyframes popMsg {
      0% { opacity: 0; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1); }
    }

    .response-area {
      margin: 1.8rem 0 1rem;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .response-message {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      padding: 0.8rem 1.8rem;
      border-radius: 80px;
      font-size: 1.2rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #faeedb;
      font-weight: 400;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      animation: fadeSlide 0.4s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .response-message.hidden {
      display: none;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(10px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .details {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      background: rgba(255, 215, 0, 0.05);
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
      color: #bdb5d1;
      border: 1px solid rgba(255, 215, 0, 0.08);
      backdrop-filter: blur(2px);
    }

    .details i {
      font-style: normal;
      background: rgba(255, 215, 0, 0.1);
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      color: #ffe28c;
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #6b6380;
      letter-spacing: 0.8px;
    }

    /* адаптив */
    @media (max-width: 420px) {
      .card { padding: 1.5rem 1rem; }
      h1 { font-size: 1.8rem; }
      .question { font-size: 1.2rem; }
      .btn { padding: 0.6rem 1.6rem; font-size: 1.2rem; }
      .btn-group { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="emoji-billiard">🎱</div>
    <h1>Бильярд &amp; Ты</h1>
    <div class="sub">✨ вечер, который мы запомним ✨</div>

    <div class="question-box">
      <div class="question">
        <span>❓</span> Составишь мне компанию за зелёным столом?
      </div>
    </div>

    <div class="btn-group" id="buttonGroup">
      <button class="btn btn-yes" id="yesBtn">Да, конечно! 🎱</button>
      <button class="btn btn-no" id="noBtn">
        Нет <span class="btn-no__message">❌ занято</span>
      </button>
    </div>

    <div class="response-area" id="responseArea">
      <div class="response-message hidden" id="responseMessage">
        <span>💫</span> <span id="messageText">Отличный выбор!</span>
      </div>
    </div>

    <div class="details">
      <span>🕒</span> <i>суббота, 19:00</i>
      <span>📍</span> <i>Billiard Club</i>
    </div>
    <div class="footer-note">♥ нажми «Нет» — и он передумает за тебя</div>
  </div>

  <script>
    (function() {
      const yesBtn = document.getElementById('yesBtn');
      const noBtn = document.getElementById('noBtn');
      const responseMessage = document.getElementById('responseMessage');
      const messageText = document.getElementById('messageText');

      // коллекция крутых ответов на "ДА"
      const yesReplies = [
        '🔥 Огонь! Жду тебя с нетерпением!',
        '💖 Ты — легенда! Бильярд будет жарким!',
        '🎱 Идеально! Твой кий уже заточен!',
        '✨ Ура! Это будет лучший вечер!',
        '💫 Я знал(а), что ты согласишься!',
        '🌟 Супер! Забронирую лучший стол!',
        '🍀 Ты сделала мой день!',
        '🎉 Погнали! Покажу тебе пару трюков!'
      ];

      // коллекция "ответов" на НЕТ (показываются, когда кнопка уже заблокирована)
      const noBlockReplies = [
        '😏 Этот ответ уже занят, выбери ДА',
        '🤭 Не-не-не, так не пойдёт!',
        '😉 Кнопка "Нет" находится в отпуске',
        '🙈 Хитрый ход! Но нет — только ДА!',
        '🧐 Ошибка 404: "Нет" не найдено',
        '😎 Только "ДА" имеет силу!',
        '🌟 Попробуй ещё раз... с зелёной кнопкой',
        '💥 Бам! "Нет" заблокирован навсегда'
      ];

      let isNoDisabled = false;      // заблокирована ли кнопка "Нет"
      let noClickCount = 0;          // сколько раз нажимали на "Нет" (для смены сообщений)
      let yesClicked = false;

      // функция показа сообщения
      function showMessage(text, emoji = '💬') {
        responseMessage.classList.remove('hidden');
        messageText.textContent = text;
        // добавим эмодзи спереди (можно заменить, но у нас уже есть span)
        const emojiSpan = responseMessage.querySelector('span:first-child');
        if (emojiSpan) emojiSpan.textContent = emoji;
        // небольшая анимация перезапуска (через удаление класса)
        responseMessage.style.animation = 'none';
        requestAnimationFrame(() => {
          responseMessage.style.animation = 'fadeSlide 0.4s ease';
        });
      }

      // обработка нажатия "НЕТ"
      function handleNoClick(e) {
        e.preventDefault();

        if (isNoDisabled) {
          // кнопка уже заблокирована — показываем сообщение "занято"
          const randomIndex = Math.floor(Math.random() * noBlockReplies.length);
          showMessage(noBlockReplies[randomIndex], '😜');
          return;
        }

        // первый, второй, третий раз нажимаем НЕТ — кнопка съезжает/изменяется
        noClickCount++;

        // меняем текст кнопки (добавляем зачеркнутый стиль или меняем текст)
        const noText = noBtn.querySelector('span:first-child');
        if (noText) {
          if (noClickCount === 1) {
            noText.textContent = 'Нет?';
          } else if (noClickCount === 2) {
            noText.textContent = 'Не-а?';
          } else if (noClickCount === 3) {
            noText.textContent = '🥺 нет?';
          } else {
            noText.textContent = '😈 нет';
          }
        }

        // добавляем класс "disabled" на кнопку (визуально блокируем) после 3-го нажатия
        if (noClickCount >= 3) {
          noBtn.classList.add('btn-no--disabled');
          isNoDisabled = true;
          // показываем сообщение, что кнопка занята
          const randomMsg = noBlockReplies[Math.floor(Math.random() * noBlockReplies.length)];
          showMessage(randomMsg, '🚫');
          // меняем текст кнопки на финальный
          if (noText) noText.textContent = 'Нет';
          // дополнительно: делаем кнопку неактивной (pointer-events уже через класс)
        } else {
          // при нажатии до блокировки показываем забавный ответ
          const hints = [
            '🤔 Подумай ещё...',
            '😉 А может ДА?',
            '🎱 Бильярд ждёт!',
            '✨ Ты уверена?',
            '💪 Смелее!'
          ];
          showMessage(hints[noClickCount - 1] || 'Попробуй ещё', '😊');
        }

        // при каждом нажатии на НЕТ делаем небольшую "встряску" кнопки
        noBtn.style.transform = 'scale(0.92)';
        setTimeout(() => { noBtn.style.transform = ''; }, 150);
      }

      // обработка "ДА"
      function handleYesClick(e) {
        e.preventDefault();
        if (yesClicked) {
          // если уже нажали ДА — показываем дополнительный позитив
          const extra = ['💖 Ты лучшая!', '🎱 Увидимся!', '✨ Жду!', '💫 Супер!'];
          showMessage(extra[Math.floor(Math.random() * extra.length)], '😍');
          return;
        }
        yesClicked = true;

        // выбор случайного ответа
        const reply = yesReplies[Math.floor(Math.random() * yesReplies.length)];
        showMessage(reply, '💖');

        // если кнопка НЕТ ещё не заблокирована — блокируем её красиво
        if (!isNoDisabled) {
          noBtn.classList.add('btn-no--disabled');
          isNoDisabled = true;
          // меняем текст на "занято"
          const noText = noBtn.querySelector('span:first-child');
          if (noText) noText.textContent = 'Нет';
          // показываем сообщение, что ответ занят (но мы уже показали yes-сообщение, но можно добавить)
          // но чтобы не перебивать, просто покажем через секунду дополнительно?
          // лучше допишем в ответное сообщение
          const currentMsg = messageText.textContent;
          messageText.textContent = currentMsg + ' 😏 (кнопка "Нет" занята)';
        }

        // анимация кнопки ДА
        yesBtn.style.transform = 'scale(1.1)';
        setTimeout(() => { yesBtn.style.transform = ''; }, 200);

        // добавим конфетти-эффект (просто визуальный текст)
        const card = document.querySelector('.card');
        card.style.transition = 'box-shadow 0.3s';
        card.style.boxShadow = '0 0 40px rgba(255,215,0,0.5), 0 30px 50px rgba(0,0,0,0.7)';
        setTimeout(() => {
          card.style.boxShadow = '';
        }, 800);
      }

      // вешаем обработчики
      yesBtn.addEventListener('click', handleYesClick);
      noBtn.addEventListener('click', handleNoClick);

      // дополнительно: если нажать на "Нет" пальцем/мышкой — контекстное меню не мешает
      noBtn.addEventListener('contextmenu', (e) => e.preventDefault());

      // инициализация: скрываем сообщение
      responseMessage.classList.add('hidden');
    })();
  </script>
</body>
</html>
